# docker-compose.yml (fill this in)
version: '3.9'
services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fitbot
      POSTGRES_USER: fitbot
      POSTGRES_PASSWORD: fitbot